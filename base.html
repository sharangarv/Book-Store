<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Books DB{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; }

    header {
      background: #2c3e50; color: white;
      padding: 16px 28px; display: flex;
      align-items: center; gap: 16px;
    }
    header h1 { font-size: 1.5rem; }
    header span { font-size: 0.85rem; opacity: 0.7; }

    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

    .toolbar {
      background: white; padding: 16px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .toolbar input, .toolbar select {
      padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.9rem; background: white;
    }
    .toolbar input { flex: 1; min-width: 180px; }
    .toolbar button {
      padding: 8px 20px; background: #2c3e50; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    .toolbar button:hover { background: #1a252f; }
    .toolbar a.clear {
      padding: 8px 14px; color: #666; text-decoration: none;
      border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem;
    }

    .stats { color: #666; font-size: 0.88rem; margin-bottom: 16px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .book-card {
      background: white; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      overflow: hidden; transition: transform .2s, box-shadow .2s;
    }
    .book-card:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
    .book-card img {
      width: 100%; height: 200px; object-fit: cover; background: #eee;
    }
    .book-card .info { padding: 14px; }
    .book-card h3 { font-size: 0.95rem; margin-bottom: 6px; line-height: 1.3; }
    .book-card h3 a { color: #2c3e50; text-decoration: none; }
    .book-card h3 a:hover { color: #e74c3c; }
    .book-card .price { font-size: 1.1rem; font-weight: 700; color: #e74c3c; margin-bottom: 4px; }
    .book-card .meta { font-size: 0.78rem; color: #888; display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      background: #eaf0fb; color: #2c3e50;
      font-size: 0.75rem; font-weight: 600;
    }
    .stars { color: #f39c12; }

    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 30px; }
    .pagination a, .pagination span {
      padding: 8px 14px; border-radius: 6px; background: white;
      border: 1px solid #ddd; color: #333; text-decoration: none; font-size: 0.9rem;
    }
    .pagination .current { background: #2c3e50; color: white; border-color: #2c3e50; }
    .pagination a:hover { background: #f0f4f8; }

    /* Detail */
    .detail-card {
      background: white; border-radius: 10px; padding: 32px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08); display: flex; gap: 32px; flex-wrap: wrap;
    }
    .detail-card img { width: 220px; border-radius: 8px; object-fit: cover; }
    .detail-content { flex: 1; min-width: 260px; }
    .detail-content h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .detail-content .price { font-size: 1.4rem; color: #e74c3c; font-weight: 700; margin-bottom: 12px; }
    .detail-content .desc { line-height: 1.8; color: #444; margin-bottom: 16px; }
    .meta-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .meta-table td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .meta-table td:first-child { font-weight: 600; color: #555; width: 140px; }
    .back-link { display: inline-block; margin-bottom: 20px; color: #2c3e50; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Books DB</h1>
    <span>1000 Books — Scraped with Scrapy — Stored in MySQL</span>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
